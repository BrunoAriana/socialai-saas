{% extends 'base.html' %}{% block content %}<div class="card" style="max-width:840px"><h1>Gerar posts premium</h1><p class="muted">Marca ativa: <b>{{ brand.business_name }}</b>. As imagens finais ficam privadas e o cliente só baixa com créditos.</p><form method="post"><label class="label">Tema da campanha</label><input class="input" name="topic" placeholder="Ex: procedimento certo para cada tipo de pele" required><div class="grid2"><div><label class="label">Objetivo do post</label><select name="objective">{% for key,label in objectives.items() %}<option value="{{key}}">{{label}}</option>{% endfor %}</select></div><div><label class="label">Estilo visual</label><select name="style">{% for key,label in styles.items() %}<option value="{{key}}">{{label}}</option>{% endfor %}</select></div></div><div class="grid2"><div><label class="label">Quantidade</label><input class="input" type="number" min="1" max="30" name="qty" value="3"></div><div><label class="label">Formato</label><select name="format"><option value="feed">Feed quadrado</option><option value="story">Story vertical</option></select></div></div><p><label><input type="checkbox" name="auto_schedule"> Agendar automaticamente a cada 2 dias</label></p><button class="btn">Gerar conteúdo e artes</button></form></div>{% endblock %}
