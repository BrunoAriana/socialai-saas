{% extends 'base.html' %}{% block content %}
<div class="card" style="max-width:560px;margin:auto">
  <h1>Esqueci minha senha</h1>
  <p class="muted">Informe seu e-mail. Se ele estiver cadastrado, enviaremos um link para criar uma nova senha.</p>
  <form method="post">
    <label class="label">E-mail cadastrado</label>
    <input class="input" type="email" name="email" required>
    <button class="btn">Enviar link de redefinição</button>
  </form>
  <div class="hr"></div>
  <p class="small"><a href="{{ url_for('login') }}">Voltar para o login</a></p>
</div>
{% endblock %}
