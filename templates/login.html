{% extends 'base.html' %}{% block content %}
<div class="card" style="max-width:520px;margin:auto">
  <h1>Entrar</h1>
  {% if google_login_enabled %}
    <a class="btn light" style="width:100%;margin-bottom:14px" href="{{ url_for('google_login') }}">Entrar com Google</a>
    <div class="muted small" style="text-align:center;margin-bottom:14px">ou entre com e-mail e senha</div>
  {% endif %}
  <form method="post">
    <label class="label">E-mail</label><input class="input" type="email" name="email" required>
    <label class="label">Senha</label><input class="input" type="password" name="password" required>
    <button class="btn">Entrar</button>
  </form>
  <div class="hr"></div>
  <p class="small"><a href="{{ url_for('forgot_password') }}">Esqueci minha senha</a></p>
  <p class="small muted">Ainda não tem conta? <a href="{{ url_for('register') }}">Criar conta</a></p>
</div>
{% endblock %}
