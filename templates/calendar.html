{% extends 'base.html' %}{% block content %}<h1>Calendário editorial</h1><table><tr><th>Data</th><th>Título</th><th>Formato</th><th>Status</th><th>Ação</th></tr>{% for p in posts %}<tr><td>{{ p.scheduled_at.strftime('%d/%m/%Y %H:%M') }}</td><td>{{ p.title }}</td><td>{{ p.format }}</td><td><span class="badge">{{ p.status }}</span></td><td><a href="{{ url_for('edit_post', post_id=p.id) }}">Editar</a></td></tr>{% else %}<tr><td colspan="5">Nenhum post agendado.</td></tr>{% endfor %}</table>{% endblock %}
