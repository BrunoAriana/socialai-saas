{% extends 'base.html' %}{% block content %}<div class="card"><h1>Identidade da marca</h1><p class="muted">Quanto melhor o cliente preencher esses dados, melhor sai o conteúdo e a arte.</p><form method="post" class="grid2"><div><label class="label">Nome da empresa</label><input class="input" name="business_name" value="{{ brand.business_name if brand else '' }}" placeholder="Ex: Sua Clínica Estética" required><label class="label">Nicho</label><input class="input" name="niche" value="{{ brand.niche if brand else '' }}" placeholder="Ex: clínica estética" required><label class="label">Público-alvo</label><input class="input" name="audience" value="{{ brand.audience if brand else '' }}" placeholder="Ex: mulheres de 25 a 45 anos que buscam autoestima" required><label class="label">Instagram/assinatura</label><input class="input" name="instagram" value="{{ brand.instagram if brand else '@suamarca' }}"></div><div><label class="label">Produto/serviço principal</label><input class="input" name="offer" value="{{ brand.offer if brand else '' }}" placeholder="Ex: avaliação estética personalizada" required><label class="label">Tom de voz</label><select name="tone"><option>Profissional</option><option>Educativo</option><option>Vendedor</option><option>Descontraído</option><option>Autoridade</option><option>Premium</option></select><label class="label">Cor principal</label><input class="input" type="color" name="primary_color" value="{{ brand.primary_color if brand else '#33251b' }}"><label class="label">Cor secundária</label><input class="input" type="color" name="secondary_color" value="{{ brand.secondary_color if brand else '#f7efe6' }}"><label class="label">Cor de destaque</label><input class="input" type="color" name="accent_color" value="{{ brand.accent_color if brand else '#b88a44' }}"><button class="btn">Salvar marca</button></div></form></div>{% endblock %}
