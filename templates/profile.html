{% extends 'base.html' %}{% block content %}
<h1>Meu perfil</h1>
<div class="grid2">
  <div class="card">
    <h2>Dados da conta</h2>
    <p class="muted small">E-mail: {{ user.email }}</p>
    <p class="muted small">Tipo de acesso: {{ 'Google' if user.google_id else 'E-mail e senha' }}</p>
    <form method="post">
      <input type="hidden" name="action" value="profile">
      <label class="label">Nome</label>
      <input class="input" name="name" value="{{ user.name }}" required>
      <button class="btn">Salvar perfil</button>
    </form>
  </div>
  <div class="card">
    <h2>Alterar senha</h2>
    <form method="post">
      <input type="hidden" name="action" value="password">
      <label class="label">Senha atual</label>
      <input class="input" type="password" name="current_password" required>
      <label class="label">Nova senha</label>
      <input class="input" type="password" name="password" minlength="6" required>
      <label class="label">Confirmar nova senha</label>
      <input class="input" type="password" name="confirm_password" minlength="6" required>
      <button class="btn">Alterar senha</button>
    </form>
  </div>
</div>
{% endblock %}
