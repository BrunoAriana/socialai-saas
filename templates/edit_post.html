{% extends 'base.html' %}{% block content %}<div class="grid2"><div class="card"><h1>Editar post</h1><form method="post"><label class="label">Título da arte</label><input class="input" name="title" value="{{ post.title }}" required><label class="label">Subtítulo da arte</label><input class="input" name="subtitle" value="{{ post.subtitle or '' }}"><label class="label">Legenda</label><textarea name="caption" required>{{ post.caption }}</textarea><label class="label">Hashtags</label><input class="input" name="hashtags" value="{{ post.hashtags }}"><div class="grid2"><div><label class="label">Formato</label><select name="format"><option value="feed" {% if post.format=='feed' %}selected{% endif %}>Feed</option><option value="story" {% if post.format=='story' %}selected{% endif %}>Story</option></select></div><div><label class="label">Estilo</label><select name="style">{% for key,label in styles.items() %}<option value="{{key}}" {% if post.style==key %}selected{% endif %}>{{label}}</option>{% endfor %}</select></div></div><label class="label">Objetivo</label><select name="objective">{% for key,label in objectives.items() %}<option value="{{key}}" {% if post.objective==key %}selected{% endif %}>{{label}}</option>{% endfor %}</select><label class="label">Status</label><select name="status"><option value="draft" {% if post.status=='draft' %}selected{% endif %}>Rascunho</option><option value="scheduled" {% if post.status=='scheduled' %}selected{% endif %}>Agendado</option><option value="published" {% if post.status=='published' %}selected{% endif %}>Publicado</option></select><label class="label">Data de agendamento</label><input class="input" type="datetime-local" name="scheduled_at" value="{{ post.scheduled_at.strftime('%Y-%m-%dT%H:%M') if post.scheduled_at else '' }}"><button class="btn">Salvar e regenerar arte</button></form></div><div class="card"><h2>Prévia protegida</h2>{% if post.image_file %}<img class="postimg" src="{{ url_for('preview', post_id=post.id) }}"><p class="row"><a class="btn secondary" href="{{ url_for('download', post_id=post.id) }}">Baixar PNG final</a><span class="badge">Créditos: {{ current_user.credits }}</span></p><p class="small muted">O PNG final não tem marca d’água e só é liberado com crédito.</p>{% endif %}<div class="hr"></div><h3>Legenda</h3><p style="white-space:pre-wrap">{{ post.caption }}</p><p>{{ post.hashtags }}</p></div></div>{% endblock %}
